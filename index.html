<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
      #ui-layer {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        z-index: 9999; display: none; background: rgba(0,0,0,0.8);
        padding: 10px; border-radius: 10px; width: 80%; text-align: center;
      }
      input { padding: 10px; width: 60%; border-radius: 5px; border: none; }
      button { padding: 10px; background: #2196F3; color: white; border: none; border-radius: 5px; }
    </style>
  </head>
  
  <body>
    <div id="ui-layer">
      <input type="text" id="userMsg" placeholder="Memory...">
      <button id="sendBtn">Add</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="panir" src="./assets/52.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="main-anchor" mindar-image-target="targetIndex: 0">
        <a-plane src="#panir" position="0 0 0" height="0.552" width="1" transparent="true"></a-plane>
        <a-entity id="memory-container"></a-entity>
      </a-entity>
    </a-scene>

    <script>
      // تنظیمات فایربیس
      const firebaseConfig = {
        apiKey: "AIzaSyB_b5em8duOmdyNF006-BR1rSCIGNriCtk",
        authDomain: "hidden-memories-27f1a.firebaseapp.com",
        projectId: "hidden-memories-27f1a",
        databaseURL: "https://hidden-memories-27f1a-default-rtdb.europe-west1.firebasedatabase.app/",
        storageBucket: "hidden-memories-27f1a.firebasestorage.app",
        messagingSenderId: "61920134607",
        appId: "1:61920134607:web:e62e0b4b3f947985b6beba"
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      const memoriesRef = db.ref('memories');

      const anchor = document.querySelector('#main-anchor');
      const container = document.querySelector('#memory-container');
      const uiLayer = document.querySelector('#ui-layer');
      let count = 0;

      // شنونده‌های رویداد برای نمایش UI
      anchor.addEventListener("targetFound", () => { 
        uiLayer.style.display = "block"; 
      });
      anchor.addEventListener("targetLost", () => { 
        uiLayer.style.display = "none"; 
      });

      // ارسال متن
      document.querySelector('#sendBtn').addEventListener('click', () => {
        const input = document.querySelector('#userMsg');
        if (input.value.trim()) {
          memoriesRef.push({ text: input.value, timestamp: Date.now() });
          input.value = "";
        }
      });

      // نمایش زنده متن‌ها
      memoriesRef.on('child_added', (snapshot) => {
        const data = snapshot.val();
        const textEl = document.createElement('a-text');
        textEl.setAttribute('value', data.text);
        textEl.setAttribute('position', `0 ${0.5 + (count * 0.2)} 0.1`);
        textEl.setAttribute('align', 'center');
        textEl.setAttribute('width', '3');
        textEl.setAttribute('color', '#FFFFFF');
        container.appendChild(textEl);
        count++;
      });
    </script>
  </body>
</html>
