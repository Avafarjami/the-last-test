<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Hidden Memories</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#ui-layer {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: none;
  background: rgba(0,0,0,0.8);
  padding: 15px;
  border-radius: 12px;
  width: 90%;
  max-width: 420px;
  box-sizing: border-box;
}

#userMsg {
  width: 68%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  outline: none;
}

#sendBtn {
  width: 28%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #2196F3;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="ui-layer">
  <input type="text" id="userMsg" placeholder="Memory..." />
  <button id="sendBtn">Add</button>
</div>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="memory-anchor" mindar-image-target="targetIndex: 0">

    <!-- تست -->
    <a-box color="red" position="0 0 0" scale="0.1 0.1 0.1"></a-box>

  </a-entity>

</a-scene>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_b5em8duOmdyNF006-BR1rSCIGNriCtk",
  authDomain: "hidden-memories-27f1a.firebaseapp.com",
  projectId: "hidden-memories-27f1a",
  databaseURL: "https://hidden-memories-27f1a-default-rtdb.europe-west1.firebasedatabase.app/",
  storageBucket: "hidden-memories-27f1a.firebasestorage.app",
  messagingSenderId: "61920134607",
  appId: "1:61920134607:web:e62e0b4b3f947985b6beba"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const memoriesRef = db.ref("memories");

const anchor = document.querySelector("#memory-anchor");
const uiLayer = document.querySelector("#ui-layer");
const input = document.querySelector("#userMsg");
const sendBtn = document.querySelector("#sendBtn");

let count = 0;

/* وقتی تارگت پیدا شد */
anchor.addEventListener("targetFound", () => {
  uiLayer.style.display = "block";
});

/* وقتی تارگت گم شد */
anchor.addEventListener("targetLost", () => {
  uiLayer.style.display = "none";
});

/* ارسال متن */
sendBtn.addEventListener("click", () => {
  const text = input.value.trim();

  if (!text) return;

  memoriesRef.push({
    text: text,
    time: Date.now()
  });

  input.value = "";
});

/* اینتر */
input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendBtn.click();
});

/* نمایش متن‌ها */
memoriesRef.on("child_added", (snapshot) => {
  const data = snapshot.val();

  const textEl = document.createElement("a-text");

  textEl.setAttribute("value", data.text);
  textEl.setAttribute("align", "center");
  textEl.setAttribute("color", "#FFFFFF");
  textEl.setAttribute("width", "2.5");
  textEl.setAttribute("wrap-count", "24");

  textEl.setAttribute(
    "position",
    `0 ${0.5 - (count * 0.2)} 0.1`
  );

  anchor.appendChild(textEl);

  count++;
});
</script>

</body>
</html>
